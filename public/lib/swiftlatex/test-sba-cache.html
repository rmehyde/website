<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftLaTeX SBA Cache Test</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; height: 300px; overflow-y: auto; border: 1px solid #ccc; }
        .controls { margin: 10px 0; }
        button { margin: 5px; padding: 10px; }
        .status { padding: 5px; margin: 5px 0; border-radius: 3px; }
        .success { background-color: #d4edda; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <h1>SwiftLaTeX SharedArrayBuffer Cache Test</h1>
    <p>This page tests the SharedArrayBuffer + IndexedDB caching system for SwiftLaTeX.</p>

    <div class="controls">
        <button onclick="initializeSystem()">Initialize System</button>
        <button onclick="testCache()" disabled id="testBtn">Test Cache</button>
        <button onclick="runStressTest()" disabled id="stressBtn">Stress Test</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>

    <div class="status" id="status">Click "Initialize System" to start</div>

    <div class="log" id="log"></div>

    <script>
        // Add COOP/COEP headers for SharedArrayBuffer support
        // Note: These should be set by the server, but we'll log a reminder
        console.log('🔒 Ensure Cross-Origin-Embedder-Policy: require-corp and Cross-Origin-Opener-Policy: same-origin headers are set');

        let xetexEngine = null;
        let dvipdfmEngine = null;
        let isInitialized = false;

        function log(message, level = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.style.marginBottom = '2px';
            entry.style.color = level === 'error' ? '#721c24' : level === 'success' ? '#155724' : '#004085';
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[${level.toUpperCase()}] ${message}`);
        }

        function updateStatus(message, level = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${level}`;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        async function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function initializeSystem() {
            log('🚀 Starting initialization...');
            updateStatus('Initializing...', 'info');

            try {
                // Check SharedArrayBuffer support
                if (typeof SharedArrayBuffer === 'undefined') {
                    throw new Error('SharedArrayBuffer not supported. Ensure COOP/COEP headers are set.');
                }
                log('✅ SharedArrayBuffer support confirmed');

                // Load engine scripts
                log('📦 Loading XeTeX Engine...');
                await loadScript('/lib/swiftlatex/XeTeXEngine.js');
                log('✅ XeTeX Engine loaded');

                log('📦 Loading DviPDFm Engine...');
                await loadScript('/lib/swiftlatex/DvipdfmxEngine.js');
                log('✅ DviPDFm Engine loaded');

                // Initialize engines
                log('🔧 Initializing XeTeX Engine...');
                xetexEngine = new window.XeTeXEngine();
                await xetexEngine.loadEngine();
                log('✅ XeTeX Engine initialized');

                log('🔧 Initializing DviPDFm Engine...');
                dvipdfmEngine = new window.DvipdfmxEngine();
                await dvipdfmEngine.loadEngine();
                log('✅ DviPDFm Engine initialized');

                // Enable test buttons
                document.getElementById('testBtn').disabled = false;
                document.getElementById('stressBtn').disabled = false;
                isInitialized = true;

                updateStatus('System initialized successfully!', 'success');
                log('🎉 System initialization complete!');

            } catch (error) {
                log(`❌ Initialization failed: ${error.message}`, 'error');
                updateStatus(`Initialization failed: ${error.message}`, 'error');
                console.error('Initialization error:', error);
            }
        }

        async function testCache() {
            if (!isInitialized) {
                log('❌ System not initialized', 'error');
                return;
            }

            log('🧪 Starting cache test...');
            updateStatus('Running cache test...', 'info');

            try {
                // Test LaTeX compilation that should trigger file lookups
                const testLatex = `
\\documentclass{article}
\\usepackage{amsmath}
\\begin{document}
\\title{Cache Test}
\\author{SBA Cache System}
\\date{\\today}
\\maketitle

\\section{Introduction}
This is a test document to verify the SharedArrayBuffer cache system.

\\begin{equation}
E = mc^2
\\end{equation}

\\section{Conclusion}
The cache should intercept file requests during compilation.
\\end{document}
                `;

                log('📝 Writing test LaTeX file...');
                xetexEngine.writeMemFSFile('test.tex', testLatex);
                xetexEngine.setEngineMainFile('test.tex');

                log('⚙️ Compiling LaTeX (this will test file lookups)...');
                const startTime = performance.now();
                const result = await xetexEngine.compileLaTeX();
                const endTime = performance.now();

                log(`✅ Compilation completed in ${Math.round(endTime - startTime)}ms`);
                log(`📄 Result status: ${result.status}`);
                log(`📝 Output size: ${result.pdf ? result.pdf.length + ' bytes' : 'No PDF generated'}`);

                if (result.status === 0 && result.pdf) {
                    updateStatus('Cache test completed successfully!', 'success');
                    log('🎉 Cache test passed!', 'success');
                } else {
                    updateStatus('Cache test completed with warnings', 'info');
                    log('⚠️ Compilation had issues, check logs above', 'error');
                }

            } catch (error) {
                log(`❌ Cache test failed: ${error.message}`, 'error');
                updateStatus(`Cache test failed: ${error.message}`, 'error');
                console.error('Cache test error:', error);
            }
        }

        async function runStressTest() {
            if (!isInitialized) {
                log('❌ System not initialized', 'error');
                return;
            }

            log('💪 Starting stress test (multiple concurrent compilations)...');
            updateStatus('Running stress test...', 'info');

            const testLatex = `
\\documentclass{article}
\\usepackage{amsmath}
\\usepackage{graphicx}
\\usepackage{color}
\\begin{document}
\\section{Stress Test}
This tests concurrent file lookups.
\\end{document}
            `;

            try {
                const numTests = 3;
                const promises = [];

                for (let i = 0; i < numTests; i++) {
                    log(`🚀 Starting compilation ${i + 1}/${numTests}...`);
                    
                    const testPromise = (async (index) => {
                        const filename = `stress_test_${index}.tex`;
                        xetexEngine.writeMemFSFile(filename, testLatex);
                        xetexEngine.setEngineMainFile(filename);
                        
                        const startTime = performance.now();
                        const result = await xetexEngine.compileLaTeX();
                        const endTime = performance.now();
                        
                        log(`✅ Compilation ${index + 1} finished in ${Math.round(endTime - startTime)}ms`);
                        return result;
                    })(i);
                    
                    promises.push(testPromise);
                    
                    // Small delay between starting compilations
                    await new Promise(resolve => setTimeout(resolve, 100));
                }

                log('⏳ Waiting for all compilations to complete...');
                const results = await Promise.all(promises);

                const successful = results.filter(r => r.status === 0).length;
                log(`📊 Stress test results: ${successful}/${numTests} successful`);

                if (successful === numTests) {
                    updateStatus('Stress test completed successfully!', 'success');
                    log('🎉 Stress test passed!', 'success');
                } else {
                    updateStatus(`Stress test completed: ${successful}/${numTests} successful`, 'info');
                    log('⚠️ Some compilations failed', 'error');
                }

            } catch (error) {
                log(`❌ Stress test failed: ${error.message}`, 'error');
                updateStatus(`Stress test failed: ${error.message}`, 'error');
                console.error('Stress test error:', error);
            }
        }

        // Log browser capabilities
        log('🔍 Browser capabilities check:');
        log(`SharedArrayBuffer: ${typeof SharedArrayBuffer !== 'undefined' ? '✅' : '❌'}`);
        log(`IndexedDB: ${typeof indexedDB !== 'undefined' ? '✅' : '❌'}`);
        log(`Web Workers: ${typeof Worker !== 'undefined' ? '✅' : '❌'}`);
        log(`Atomics: ${typeof Atomics !== 'undefined' ? '✅' : '❌'}`);
    </script>
</body>
</html>
